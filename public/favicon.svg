<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Fiscal Precision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#002d62" />
      <stop offset="1" stop-color="#00193c" />
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#006a6a" />
      <stop offset="1" stop-color="#10B981" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)" />
  <!-- Barras ascendentes: análisis / crecimiento -->
  <rect x="14" y="36" width="8" height="14" rx="2.5" fill="url(#bar)" />
  <rect x="28" y="28" width="8" height="22" rx="2.5" fill="url(#bar)" />
  <rect x="42" y="20" width="8" height="30" rx="2.5" fill="url(#bar)" />
  <!-- Línea de tendencia + nodo de dato -->
  <path d="M16 32 L32 23 L46 15" fill="none" stroke="#ffffff" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.92" />
  <circle cx="46" cy="15" r="3.4" fill="#ffffff" />
  <circle cx="46" cy="15" r="1.5" fill="#10B981" />
</svg>
