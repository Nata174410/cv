name: ✅ CI

# Valida que el sitio compile en cada Pull Request hacia main.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    name: 🔍  Build check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: ⚙️  Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦  Install dependencies
        run: npm ci

      - name: 🔎  Type & content check
        run: npx astro check || true

      - name: 🔨  Build
        run: npm run build
